<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="/front-end/components/header/header.css" />
    <link rel="stylesheet" href="/front-end/components/etoile/etoile.css" />
    <title>Document</title>
  </head>
  <body>
    <header id="hd"></header>
    <main>
      <section class="hero">
        <p class="hero-title">commander un service</p>
      </section>
      <section class="service-infos">
        <div class="service-title flex-row">
          <p class="service-title"></p>
          <button class="btn-full">commander</button>
        </div>
        <div class="service-review flex-row">
          <p class="flex-row">
            <span class="service-note"></span><span class="service-star"></span>
          </p>
          <p class="flex-row">(<span class="service-avis"></span>avis)</p>
        </div>

        <div class="service-meta flex-row">
          <p><span class="service-prix"></span>FCFA</p>
          <p class="flex-row">
            <span
              ><svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.3"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 6v6l4 2" />
                <circle cx="12" cy="12" r="10" /></svg
            ></span>
            <span class="service-delivery">10</span> jours
          </p>
        </div>
        <div class="service-profil flex-row">
          <div class="service-profil-container profil"></div>
          <div class="service-profil-infos flex-column">
            <p class="service-profil-pseudo">devUltime</p>
            <p class="service-profil-prof">developpeur</p>
          </div>
          <div class="profil-mention flex-column">
            <span class="profil-verified"
              ><svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="rgba(32,161,32,1)"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"
                />
                <path d="m9 12 2 2 4-4" />
              </svg>
            </span>
            <p class="profil-top-rated">top rated</p>
          </div>
        </div>
      </section>
      <section class="service-galerie">
        <section class="service-galerie">
          <div class="galerie-container">
            <!-- Vidéo de présentation -->
            <div class="galerie-video">
              <div class="video-placeholder" id="video-placeholder">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="48"
                  height="48"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
                  <polygon points="10 8 16 12 10 16 10 8"></polygon>
                </svg>
                <p>Aucune vidéo de présentation</p>
              </div>
              <video id="service-video" controls style="display: none">
                <source src="" type="video/mp4" />
                Votre navigateur ne supporte pas la lecture vidéo.
              </video>
            </div>

            <!-- Galerie d'images -->
            <div class="galerie-images">
              <div class="images-grid" id="images-grid">
                <div class="image-placeholder">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="32"
                    height="32"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect
                      x="2"
                      y="2"
                      width="20"
                      height="20"
                      rx="2"
                      ry="2"
                    ></rect>
                    <circle cx="8.5" cy="8.5" r="2.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                  </svg>
                  <p>Aucune image</p>
                </div>
              </div>
            </div>
          </div>
        </section>
      </section>
      <section class="service-commander"></section>
    </main>

    <!--js -->
    <script src="main.js" type="module"></script>
  </body>
</html>
