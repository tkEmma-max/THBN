<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />
		<link rel="stylesheet" href="styles.css" />
		<link rel="stylesheet" href="/front-end/assets/styles/service.css" />
		<link rel="stylesheet" href="/front-end/components/etoile/etoile.css" />
		<link rel="stylesheet" href="/front-end/components/header/header.css" />
		<title>services</title>
	</head>
	<body>
		<header id="hd"></header>
		<main>
			<section class="hero">
				<p class="hero-title">trouver le service parfait</p>
			</section>
			<div class="filter flex-row">
				<div class="filter-item-group">
					<button class="filter-item flex-row" id="categorie-filter">
						<span>categorie</span>
						<span
							><svg
								xmlns="http://www.w3.org/2000/svg"
								width="24"
								height="24"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<path d="m19 12-7 7-7-7" /></svg
						></span>
					</button>
					<div class="filter-item-detail" id="categorie-detail">
						<ul>
							<li>developpement web</li>
							<li>design graphic</li>
							<li>retouche photo</li>
							<li>montage video</li>
						</ul>
					</div>
				</div>
				<div class="filter-item-group">
					<button class="filter-item flex-row" id="delai-filter">
						<span>delai</span>
						<span
							><svg
								xmlns="http://www.w3.org/2000/svg"
								width="24"
								height="24"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<path d="m19 12-7 7-7-7" /></svg
						></span>
					</button>
					<div class="filter-item-detail" id="delai-detail">
						<label for="delai-min">delai (min):</label>
						<input
							type="number"
							min="0"
							max="5"
							step="1"
							value="0"
							id="delai-min"
						/><br />
						<label for="delai-max">delai (max):</label>
						<input
							type="number"
							min="0"
							max="5"
							step="1"
							value="0"
							id="delai-max"
						/><br/>
<button class="btn-full">appliquer</button>
					</div>
				</div>
				<div class="filter-item-group">
					<button class="filter-item flex-row" id="note-filter">
						<span>note</span>
						<span
							><svg
								xmlns="http://www.w3.org/2000/svg"
								width="24"
								height="24"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<path d="m19 12-7 7-7-7" /></svg
						></span>
					</button>
					<div class="filter-item-detail" id="note-detail">
						<input
							type="number"
							min="0"
							max="5"
							step="1"
							value="0"
						/>
					</div>
				</div>
				<div class="filter-item-group">
					<button class="filter-item flex-row" id="trie-filter">
						<span>trié par</span>
						<span
							><svg
								xmlns="http://www.w3.org/2000/svg"
								width="24"
								height="24"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<path d="m19 12-7 7-7-7" /></svg
						></span>
					</button>
					<div class="filter-item-detail" id="trie-detail">
						<ul>
							<li>developpement web</li>
							<li>design graphic</li>
							<li>retouche photo</li>
							<li>montage video</li>
						</ul>
					</div>
				</div>
			</div>
			<div class="services">
				<p>services les plus populaire dans cette categorie</p>
				<!--template pour les service -->
				<template id="service-template" class="flex-column">
					<div class="service flex-column">
						<div class="service-img"></div>
						<p class="service-title"></p>
						<div class="service-review flex-row">
							<p class="flex-row">
								<span class="service-note">4.5</span
								><span class="service-star"></span>
							</p>
							<p class="flex-row">
								(<span class="service-avis"></span>avis)
							</p>
						</div>

						<div class="service-meta flex-row">
							<p><span class="service-prix"></span>FCFA</p>
							<p class="flex-row">
								<span
									><svg
										xmlns="http://www.w3.org/2000/svg"
										width="20"
										height="20"
										viewBox="0 0 24 24"
										fill="none"
										stroke="currentColor"
										stroke-width="2.3"
										stroke-linecap="round"
										stroke-linejoin="round"
									>
										<path d="M12 6v6l4 2" />
										<circle cx="12" cy="12" r="10" /></svg
								></span>
								<span class="service-delivery"></span> jours
							</p>
						</div>
						<div class="service-profil flex-row">
							<div class="service-profil-container profil"></div>
							<div class="service-profil-infos flex-column">
								<p class="service-profil-pseudo"></p>
								<p class="service-profil-prof"></p>
							</div>
							<div class="profil-mention flex-column">
								<span class="profil-verified"
									><svg
										xmlns="http://www.w3.org/2000/svg"
										width="20"
										height="20"
										viewBox="0 0 24 24"
										fill="none"
										stroke="rgba(32,161,32,1)"
										stroke-width="2"
										stroke-linecap="round"
										stroke-linejoin="round"
									>
										<path
											d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"
										/>
										<path d="m9 12 2 2 4-4" />
									</svg>
								</span>
								<p class="profil-top-rated">top rated</p>
							</div>
						</div>
					</div>
				</template>
				<div class="all-services"></div>
			</div>
		</main>
		<footer></footer>
		<script src="./main.js" type="module"></script>
		<script src="./services.js" type="module"></script>
		<script src="./filter.js" type="module"></script>
	</body>
</html>
